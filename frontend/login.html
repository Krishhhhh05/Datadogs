<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venture Forge — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --border: rgba(255, 255, 255, 0.08);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.25);
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(139, 92, 246, 0.06) 0%, transparent 50%);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4), 0 0 40px var(--accent-glow);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .login-title {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.3rem;
        }

        .login-subtitle {
            font-size: 0.82rem;
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.92rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-group input::placeholder {
            color: #475569;
        }

        .login-btn {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
            margin-top: 0.5rem;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--error);
            padding: 0.6rem 0.8rem;
            border-radius: 8px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            display: none;
            text-align: center;
        }

        .login-error.visible {
            display: block;
            animation: shake 0.4s ease;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20%,
            60% {
                transform: translateX(-6px);
            }

            40%,
            80% {
                transform: translateX(6px);
            }
        }

        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.72rem;
            color: #475569;
        }

        .toggle-link {
            text-align: center;
            margin-top: 1.2rem;
            font-size: 0.82rem;
            color: var(--text-secondary);
        }

        .toggle-link a {
            color: #818cf8;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .toggle-link a:hover {
            text-decoration: underline;
        }

        .login-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
            padding: 0.6rem 0.8rem;
            border-radius: 8px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            display: none;
            text-align: center;
        }

        .login-success.visible {
            display: block;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">🐾</div>
                <div class="login-title">Venture Forge</div>
                <div class="login-subtitle" id="formSubtitle">Multi-Agent Product Launch OS</div>
            </div>

            <div id="loginError" class="login-error">Invalid username or password</div>
            <div id="successMsg" class="login-success">Account created! Please sign in.</div>

            <!-- Sign In Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginUser">Username</label>
                    <input type="text" id="loginUser" placeholder="Enter username" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="loginPass">Password</label>
                    <input type="password" id="loginPass" placeholder="Enter password" autocomplete="current-password"
                        required>
                </div>
                <button type="submit" class="login-btn">Sign In →</button>
            </form>

            <!-- Sign Up Form -->
            <form id="registerForm" class="hidden" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="regName">Full Name</label>
                    <input type="text" id="regName" placeholder="e.g. Jane Doe" required>
                </div>
                <div class="form-group">
                    <label for="regUser">Username</label>
                    <input type="text" id="regUser" placeholder="Choose a username" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="regPass">Password</label>
                    <input type="password" id="regPass" placeholder="Choose a password" autocomplete="new-password"
                        required>
                </div>
                <button type="submit" class="login-btn">Create Account →</button>
            </form>

            <div class="toggle-link" id="toggleLink">
                Don't have an account? <a onclick="showRegister()">Create one</a>
            </div>

            <div class="login-footer">
                Powered by Groq AI &mdash; Secured Access
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5001';

        if (sessionStorage.getItem('venture_forge_user')) {
            window.location.href = 'app.html';
        }

        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('toggleLink').innerHTML = 'Already have an account? <a onclick="showLogin()">Sign in</a>';
            document.getElementById('formSubtitle').textContent = 'Create your account';
            document.getElementById('loginError').classList.remove('visible');
            document.getElementById('successMsg').classList.remove('visible');
        }

        function showLogin() {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('toggleLink').innerHTML = 'Don\'t have an account? <a onclick="showRegister()">Create one</a>';
            document.getElementById('formSubtitle').textContent = 'Multi-Agent Product Launch OS';
            document.getElementById('loginError').classList.remove('visible');
        }

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUser').value.trim();
            const password = document.getElementById('loginPass').value;
            const errorEl = document.getElementById('loginError');
            document.getElementById('successMsg').classList.remove('visible');
            errorEl.classList.remove('visible');

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    sessionStorage.setItem('venture_forge_user', JSON.stringify(data.user));
                    window.location.href = 'app.html';
                } else {
                    errorEl.textContent = data.error || 'Invalid username or password';
                    errorEl.classList.add('visible');
                }
            } catch (err) {
                errorEl.textContent = 'Cannot connect to server. Is the backend running?';
                errorEl.classList.add('visible');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const username = document.getElementById('regUser').value.trim();
            const password = document.getElementById('regPass').value;
            const errorEl = document.getElementById('loginError');
            errorEl.classList.remove('visible');

            if (password.length < 4) {
                errorEl.textContent = 'Password must be at least 4 characters';
                errorEl.classList.add('visible');
                return;
            }

            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, username, password }),
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    showLogin();
                    document.getElementById('successMsg').classList.add('visible');
                    document.getElementById('loginUser').value = username;
                    document.getElementById('loginPass').focus();
                } else {
                    errorEl.textContent = data.error || 'Registration failed';
                    errorEl.classList.add('visible');
                }
            } catch (err) {
                errorEl.textContent = 'Cannot connect to server. Is the backend running?';
                errorEl.classList.add('visible');
            }
        }
    </script>
</body>

</html>
